name: Build Deno APK for Android

# Combined workflow: builds deno jniLibs from termux source, then assembles,
# signs, and releases the YTDLnis Deno Package APK.
#
# Required GitHub repository secrets for release signing:
#   YTDLNIS_KEYSTORE_BASE64    base64-encoded .jks keystore (keytool + base64 -w0)
#   YTDLNIS_KEYSTORE_PASSWORD  keystore password
#   YTDLNIS_KEY_ALIAS          key alias inside the keystore
#   YTDLNIS_KEY_PASSWORD       password for that key alias
# If any are missing, the gradlew assembleRelease step will fail when gradle
# cannot load the keystore. (The gradle's try/catch only suppresses errors
# when keystore.properties does not exist; once written, it must be valid.)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Deno plugin for YTDLnis (optional override; otherwise read from termux)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build_deno:
    name: Build Deno JNI Libraries
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # --------------------------------------------------------------------
      # Why these two steps exist:
      # The previous run failed with:
      #   error: linking with `aarch64-linux-android-clang` failed: exit status: 1
      #   = note: clang: error: unable to execute command: Bus error (core dumped)
      #           clang: error: linker command failed due to signal
      # i.e. ld.lld was killed by SIGBUS during the FINAL link of the deno
      # binary (which statically links V8 + aws-lc and is enormous). SIGBUS at
      # link time on GitHub-hosted runners is a resource problem, not a code
      # bug: it happens when the runner runs out of RAM and/or the filesystem
      # backing the linker's mmap'd output runs out of space. The stock
      # ubuntu-latest runner (4 CPU / ~16 GB RAM / ~21 GB free on '/') is too
      # small for two consecutive deno links. The next two steps give the build
      # more disk and more virtual memory so the link can finish.
      # --------------------------------------------------------------------
      - name: Free up disk space
        run: |
          echo "=== Disk before cleanup ==="
          df -h /
          # The deno Rust target tree (V8 + aws-lc + every crate, for BOTH
          # arm64 and x86_64) lives inside Docker's overlay on '/'. Reclaim the
          # large preinstalled toolchains this job never uses (~25-35 GB). Done
          # before the termux image is pulled so the space is available to it.
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf /usr/local/lib/node_modules || true
          sudo rm -rf "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}" || true
          sudo docker image prune --all --force || true
          sudo apt-get clean || true
          echo "=== Disk after cleanup ==="
          df -h /

      - name: Increase swap space
        run: |
          echo "=== Memory before ==="
          free -h
          # Add a large swapfile on the big /mnt temp disk (~65 GB free) so the
          # memory-hungry final link of the deno binary has enough virtual
          # memory and is not OOM/SIGBUS-killed. /mnt is separate from '/', so
          # this does not compete with the Docker build for disk.
          SWAP_FILE=/mnt/deno-swapfile
          sudo swapoff -a || true
          sudo rm -f "$SWAP_FILE" || true
          sudo fallocate -l 16G "$SWAP_FILE" || sudo dd if=/dev/zero of="$SWAP_FILE" bs=1M count=16384
          sudo chmod 600 "$SWAP_FILE"
          sudo mkswap "$SWAP_FILE"
          sudo swapon "$SWAP_FILE"
          echo "=== Memory after ==="
          free -h

      - name: Checkout termux-packages
        run: git clone --depth=1 https://github.com/termux/termux-packages

      - name: Prepare build script
        run: |
          cp scripts/build-deno.sh termux-packages/build-deno.sh
          chmod +x termux-packages/build-deno.sh

      - name: Set up version
        id: version
        run: |
          cd termux-packages/packages/deno
          # TERMUX_PKG_VERSION uses Debian-style epoch prefix "1:"; strip it
          # so "1:2.8.3" becomes "2.8.3" for the artifact / release tag.
          RAW=$(grep "^TERMUX_PKG_VERSION=" build.sh | cut -d'=' -f2 | tr -d '"' | tr -d "'")
          VERSION="${RAW#*:}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Deno version: $VERSION (raw: $RAW)"

      - name: Build Deno (arm64-v8a + x86_64 only)
        working-directory: termux-packages
        env:
          # run-docker.sh forwards TERMUX_DOCKER_RUN_EXTRA_ARGS to `docker run`
          # when it CREATES the builder container. Docker's default /dev/shm is
          # only 64 MB, which can trigger memory-mapped-IO failures (SIGBUS)
          # during the very large final link. Give the container a roomy shm.
          # NOTE: the container is created by the FIRST run-docker.sh call
          # (clean.sh) below, so this must be set for that call too — hence it
          # is declared at step level rather than inline before build-deno.sh.
          TERMUX_DOCKER_RUN_EXTRA_ARGS: "--shm-size=4g"
        run: |
          echo "Building Deno"
          ./scripts/run-docker.sh ./clean.sh
          ./scripts/run-docker.sh ./build-deno.sh

      - name: Verify build outputs
        run: |
          echo "=== JNI Libraries Structure ==="
          find termux-packages/output/jniLibs -type f
          # Deno is 64-bit only (TERMUX_PKG_EXCLUDED_ARCHES="i686, arm" in
          # termux's deno recipe), so only these two ABIs are expected.
          for arch in arm64-v8a x86_64; do
            if [ -d "termux-packages/output/jniLibs/$arch" ]; then
              echo "--- $arch ---"
              ls -lh "termux-packages/output/jniLibs/$arch/"
            else
              echo "ERROR: expected ABI $arch missing from output/jniLibs"
              find termux-packages/output -maxdepth 3 -type d
              exit 1
            fi
          done

      - name: Create release packages
        id: package
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          RELEASE_DIR="${{ github.workspace }}/release"
          mkdir -p "$RELEASE_DIR"

          cd termux-packages/output/jniLibs

          for arch in arm64-v8a x86_64; do
            if [ -d "$arch" ]; then
              echo "Packaging $arch..."

              # Verify required files exist
              if [ ! -f "$arch/libdeno.so" ]; then
                echo "ERROR: libdeno.so not found in $arch"
                exit 1
              fi
              if [ ! -f "$arch/libdeno.zip.so" ]; then
                echo "ERROR: libdeno.zip.so not found in $arch"
                exit 1
              fi

              ZIP_NAME="deno-${VERSION}-${arch}.zip"
              cd "$arch"
              zip -9 "$RELEASE_DIR/$ZIP_NAME" *
              cd ..

              echo "✓ Created: $ZIP_NAME"
              ls -lh "$RELEASE_DIR/$ZIP_NAME"
            fi
          done

          echo ""
          echo "=== Release Packages ==="
          ls -lh "$RELEASE_DIR/"

      - name: Generate checksums
        working-directory: ${{ github.workspace }}/release
        run: |
          sha256sum *.zip > SHA256SUMS.txt
          echo ""
          echo "=== SHA256 Checksums ==="
          cat SHA256SUMS.txt

      - name: Upload arm64-v8a jniLibs
        uses: actions/upload-artifact@v7
        with:
          name: deno-${{ steps.version.outputs.VERSION }}-arm64-v8a
          path: ${{ github.workspace }}/release/deno-${{ steps.version.outputs.VERSION }}-arm64-v8a.zip
          retention-days: 90
          compression-level: 0

      - name: Upload x86_64 jniLibs
        uses: actions/upload-artifact@v7
        with:
          name: deno-${{ steps.version.outputs.VERSION }}-x86_64
          path: ${{ github.workspace }}/release/deno-${{ steps.version.outputs.VERSION }}-x86_64.zip
          retention-days: 90
          compression-level: 0

      - name: Upload checksums
        uses: actions/upload-artifact@v7
        with:
          name: deno-${{ steps.version.outputs.VERSION }}-SHA256SUMS
          path: ${{ github.workspace }}/release/SHA256SUMS.txt
          retention-days: 90

      - name: Build Summary (jniLibs)
        run: |
          echo "## Deno JNI Libraries Built 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts:" >> $GITHUB_STEP_SUMMARY
          cd ${{ github.workspace }}/release
          for file in *.zip; do
            size=$(ls -lh "$file" | awk '{print $5}')
            echo "- \`$file\` ($size)" >> $GITHUB_STEP_SUMMARY
          done

  build_apk:
    name: Build, Sign, and Release APK
    needs: build_deno
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'corretto'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Resolve Deno version
        id: version
        run: |
          # Single source of truth: reuse the EXACT version that the
          # build_deno job used to NAME the uploaded artifacts (it derives that
          # from termux's TERMUX_PKG_VERSION). This avoids the GNU-vs-BSD `sed`
          # difference on the macOS runner (BSD sed treats \s as a literal 's',
          # so the old regex never matched and VERSION became the raw gradle
          # lines) and guarantees VERSION matches the artifact names.
          VERSION="${{ needs.build_deno.outputs.version }}"
          # Optional workflow_dispatch override, only if the job output is empty.
          if [ -z "$VERSION" ]; then
            RAW="${{ github.event.inputs.version }}"
            VERSION="${RAW#*:}"
          fi
          if [ -z "$VERSION" ]; then
            echo "ERROR: Could not resolve Deno version (build_deno output empty)."
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Deno APK version: $VERSION"

      - name: Download Deno JNI Libraries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p deno_jnilibs
          gh run download "$GITHUB_RUN_ID" \
            --dir deno_jnilibs \
            --name "deno-${VERSION}-arm64-v8a" \
            --name "deno-${VERSION}-x86_64" || true
          # Fallback: download by artifact name pattern if the above fails.
          if [ -z "$(find deno_jnilibs -name 'deno-*.zip' 2>/dev/null)" ]; then
            echo "Targeted download failed; downloading all deno artifacts from this run..."
            gh api "repos/${{ github.repository }}/actions/runs/$GITHUB_RUN_ID/artifacts" \
              --jq '.artifacts[] | select(.name | startswith("deno-")) | .name' > /tmp/artifacts.txt
            while read -r name; do
              [ -z "$name" ] && continue
              gh run download "$GITHUB_RUN_ID" --dir deno_jnilibs --name "$name" || true
            done < /tmp/artifacts.txt
          fi
          echo "=== Downloaded artifacts ==="
          find deno_jnilibs -type f

      - name: Extract and place JNI libraries
        run: |
          # Deno ships only 2 ABIs (64-bit only). Locate each zip with
          # `find` so extraction works regardless of whether `gh run download`
          # placed it flat (deno_jnilibs/deno-<v>-<arch>.zip) or inside a
          # per-artifact subfolder (deno_jnilibs/deno-<v>-<arch>/...).
          for arch in arm64-v8a x86_64; do
            mkdir -p "deno_package/app/src/main/jniLibs/$arch"
            ZIP_PATH=$(find deno_jnilibs -type f -name "deno-${VERSION}-${arch}.zip" | head -1)
            if [ -n "$ZIP_PATH" ] && [ -f "$ZIP_PATH" ]; then
              echo "Found $arch zip: $ZIP_PATH"
              unzip -o "$ZIP_PATH" -d "deno_package/app/src/main/jniLibs/$arch/"
            else
              echo "ERROR: No zip found for $arch (deno-${VERSION}-${arch}.zip)"
              find deno_jnilibs
              exit 1
            fi
          done
          echo "=== JNI Libraries prepared ==="
          find deno_package/app/src/main/jniLibs -type f

      - name: Materialize signing keystore
        env:
          DENO_KEYSTORE_BASE64: ${{ secrets.YTDLNIS_KEYSTORE_BASE64 }}
          DENO_KEYSTORE_PASSWORD: ${{ secrets.YTDLNIS_KEYSTORE_PASSWORD }}
          DENO_KEY_ALIAS: ${{ secrets.YTDLNIS_KEY_ALIAS }}
          DENO_KEY_PASSWORD: ${{ secrets.YTDLNIS_KEY_PASSWORD }}
        run: |
          if [ -z "$DENO_KEYSTORE_BASE64" ]; then
            echo "ERROR: DENO_KEYSTORE_BASE64 secret is not set."
            echo "Required secrets: DENO_KEYSTORE_BASE64, DENO_KEYSTORE_PASSWORD, DENO_KEY_ALIAS, DENO_KEY_PASSWORD"
            exit 1
          fi
          # gradle's signingConfig does `storeFile = file("deno.jks")` from the
          # :app module (deno_package/app/build.gradle.kts), so Gradle resolves
          # it RELATIVE TO THE APP MODULE -> deno_package/app/deno.jks. That is
          # exactly the path the previous run reported as "not found", so decode
          # the keystore to that location. (keystore.properties is read via
          # rootProject.file(...) and correctly stays in the deno_package root.)
          mkdir -p deno_package/app
          echo "$DENO_KEYSTORE_BASE64" | base64 --decode > deno_package/app/deno.jks
          # Write keystore.properties with the exact property names the gradle
          # expects (deno_package/app/build.gradle.kts:35-38):
          #   signingConfig.storeFile / storePassword / keyAlias / keyPassword
          cat > deno_package/keystore.properties <<EOF
          signingConfig.storeFile=deno.jks
          signingConfig.storePassword=$DENO_KEYSTORE_PASSWORD
          signingConfig.keyAlias=$DENO_KEY_ALIAS
          signingConfig.keyPassword=$DENO_KEY_PASSWORD
          EOF
          echo "keystore.properties written (keystore size: $(wc -c < deno_package/app/deno.jks) bytes)"

      - name: Build APK with Gradle
        working-directory: deno_package
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Copy built APKs for release
        run: |
          mkdir -p apk_release
          find deno_package/app/build/outputs/apk/release -name "*.apk" -exec cp {} apk_release/ \;
          echo "=== APKs for release ==="
          ls -lh apk_release/

      - name: Create GitHub Release and Upload APKs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "deno-v${VERSION}" apk_release/*.apk \
            --title "Deno Package v${VERSION}" \
            --notes "Precompiled Deno plugin release for YTDLnis. Built from Termux deno ${VERSION} (64-bit ABIs only: arm64-v8a, x86_64)." \
            --generate-notes || echo "Release already exists or failed to create."

      - name: Build Summary (APK)
        run: |
          echo "## Deno APK Built 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Release APKs:" >> $GITHUB_STEP_SUMMARY
          cd apk_release
          for file in *.apk; do
            size=$(ls -lh "$file" | awk '{print $5}')
            echo "- \`$file\` ($size)" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Release tag: \`deno-v${VERSION}\`" >> $GITHUB_STEP_SUMMARY
