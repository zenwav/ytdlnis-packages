name: Build Python with curl_cffi for Android

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Python plugin for YTDLnis'
        required: true
        type: string

jobs:
  build_curl_cffi:
    name: Build curl_cffi wheels (${{ matrix.jni_arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # 64-bit ABIs only — cibuildwheel's Android platform only
          # supports arm64_v8a and x86_64 (see ANDROID_TRIPLET in
          # cibuildwheel/platforms/android.py). 32-bit ABIs are handled
          # by build_libcurl_impersonate_32bit + cross-compilation.
          - jni_arch: arm64-v8a
            cibw_arch: arm64_v8a
            termux_binary: binary-aarch64
          - jni_arch: x86_64
            cibw_arch: x86_64
            termux_binary: binary-x86_64
    steps:
      - name: Checkout curl_cffi repository
        uses: actions/checkout@v7
        with:
          repository: lexiforest/curl_cffi
          path: curl_cffi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool make zip

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: all

      - name: Patch curl_cffi libs.json for x86_64 Android
        # curl_cffi's libs.json only contains an Android/aarch64 entry.
        # When building for x86_64, detect_arch() in scripts/build.py
        # raises "Unsupported arch" because there is no matching entry.
        # We add an Android/x86_64 entry that mirrors the aarch64 one,
        # pointing at the x86_64-linux-android libcurl-impersonate
        # release tarball (which does exist in the curl-impersonate
        # GitHub releases).
        if: matrix.cibw_arch == 'x86_64'
        run: |
          python3 -c "
          import json
          path = 'curl_cffi/libs.json'
          with open(path) as f:
              archs = json.load(f)
          exists = any(
              a.get('system') == 'Android' and a.get('machine') == 'x86_64'
              for a in archs
          )
          if not exists:
              new_entry = {
                  'system': 'Android',
                  'machine': 'x86_64',
                  'pointer_size': 64,
                  'sysname': 'linux-android',
                  'link_type': 'static',
                  'libc': 'android',
                  'obj_name': 'libcurl-impersonate.a',
                  'arch': 'x86_64',
              }
              archs.append(new_entry)
              with open(path, 'w') as f:
                  json.dump(archs, f, indent=2)
              print('Added Android/x86_64 entry to libs.json')
          else:
              print('Android/x86_64 entry already present')
          "
          echo "=== Updated libs.json (Android entries) ==="
          python3 -c "
          import json
          with open('curl_cffi/libs.json') as f:
              for a in json.load(f):
                  if a.get('system') == 'Android':
                      print(json.dumps(a, indent=2))
          "

      - name: Build curl_cffi Wheel
        uses: pypa/cibuildwheel@v3.3.1
        with:
          package-dir: curl_cffi
        env:
          CIBW_PLATFORM: android
          CIBW_BUILD: cp313-android_${{ matrix.cibw_arch }}
          CIBW_BEFORE_ALL: "make -C curl_cffi preprocess"
          # Skip the test phase for x86_64 only. arm64-v8a passes the
          # test phase as-is. x86_64 fails because pip can't find a
          # cffi wheel for android_24_x86_64 on PyPI (and even if it
          # could, the compiled _wrapper.abi3.so can't be imported on
          # the Linux host).
          CIBW_TEST_SKIP: ${{ matrix.cibw_arch == 'x86_64' && '*' || '' }}
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_API_LEVEL: 24

      - name: Build cffi Wheel
        run: |
          pip install cibuildwheel==3.3.1
          curl -L -o packages.txt "https://packages-cf.termux.org/apt/termux-main/dists/stable/main/${{ matrix.termux_binary }}/Packages"
          libffi_path=$(grep -A 10 "Package: libffi$" packages.txt | grep "Filename: " | cut -d' ' -f2)
          curl -L -o libffi.deb "https://packages-cf.termux.org/apt/termux-main/$libffi_path"

          pip download --no-binary :all: --no-deps cffi
          tar -xf cffi-*.tar.gz
          cffi_dir=$(ls -d cffi-*/)

          mkdir -p "$cffi_dir/libffi_extracted"
          dpkg-deb -x libffi.deb "$cffi_dir/libffi_extracted"

          LIBFFI_PREFIX="${PWD%/}/${cffi_dir%/}/libffi_extracted/data/data/com.termux/files/usr"
          export LIBFFI_PREFIX

          python -c "
          import os
          setup_path = os.path.join('$cffi_dir', 'setup.py')
          prefix = os.environ['LIBFFI_PREFIX']
          content = open(setup_path).read()
          old_inc = \"include_dirs = ['/usr/include/ffi',\n                '/usr/include/libffi']\"
          new_inc = \"include_dirs = [\" + repr(prefix + '/include') + \"]\"
          assert old_inc in content, 'include_dirs pattern not found in setup.py'
          content = content.replace(old_inc, new_inc)
          old_lib = 'library_dirs = []'
          new_lib = \"library_dirs = [\" + repr(prefix + '/lib') + \"]\"
          assert old_lib in content, 'library_dirs pattern not found in setup.py'
          content = content.replace(old_lib, new_lib)
          content = content.replace('def use_pkg_config():', 'def use_pkg_config():\n    return')
          open(setup_path, 'w').write(content)
          print('setup.py patched successfully! libffi prefix:', prefix)
          "

          cibuildwheel "$cffi_dir" --output-dir wheelhouse
        env:
          CIBW_PLATFORM: android
          CIBW_BUILD: cp313-android_${{ matrix.cibw_arch }}
          CIBW_ARCHS: ${{ matrix.cibw_arch }}
          # Skip tests for x86_64 only (see curl_cffi step for rationale).
          CIBW_TEST_SKIP: ${{ matrix.cibw_arch == 'x86_64' && '*' || '' }}
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_API_LEVEL: 24

      - name: Build pycryptodome Wheel
        run: |
          pip download --no-binary :all: --no-deps pycryptodome
          tar -xf pycryptodome-*.tar.gz
          crypto_dir=$(ls -d pycryptodome-*/)
          cibuildwheel "$crypto_dir" --output-dir wheelhouse
        env:
          CIBW_PLATFORM: android
          CIBW_BUILD: cp313-android_${{ matrix.cibw_arch }}
          CIBW_ARCHS: ${{ matrix.cibw_arch }}
          # Skip tests for x86_64 only (see curl_cffi step for rationale).
          CIBW_TEST_SKIP: ${{ matrix.cibw_arch == 'x86_64' && '*' || '' }}
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_API_LEVEL: 24

      - name: Upload Wheels (${{ matrix.jni_arch }})
        uses: actions/upload-artifact@v7
        with:
          name: curl_cffi-android-wheels-${{ matrix.jni_arch }}
          path: wheelhouse/*.whl

  build_libcurl_impersonate_32bit:
    name: Build libcurl-impersonate (${{ matrix.jni_arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # 32-bit ABIs — cibuildwheel cannot produce these, so we
          # build libcurl-impersonate from source using the NDK and
          # then cross-compile curl_cffi against it inside the Termux
          # docker in build_python.sh.
          #
          # ndk_abi         : CMAKE_ANDROID_ARCH_ABI value
          # compiler_prefix : NDK clang prefix (API level appended)
          # curl_arch       : value used in curl_cffi libs.json "arch" field
          # target_machine  : value used in curl_cffi libs.json "machine" field
          #                   (must match what platform.uname().machine returns
          #                    on the target — we patch it via sitecustomize.py)
          - jni_arch: armeabi-v7a
            ndk_abi: armeabi-v7a
            compiler_prefix: armv7a-linux-androideabi
            curl_arch: arm
            target_machine: armv7l
          - jni_arch: x86
            ndk_abi: x86
            compiler_prefix: i686-linux-android
            curl_arch: i386
            target_machine: i686
    steps:
      - name: Checkout curl-impersonate repository
        uses: actions/checkout@v7
        with:
          repository: lexiforest/curl-impersonate
          path: curl-impersonate

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config cmake ninja-build \
            curl autoconf automake libtool gperf golang-go

      - name: Build libcurl-impersonate
        working-directory: curl-impersonate
        env:
          NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
          API: "24"
          TARGET: ${{ matrix.compiler_prefix }}
          ANDROID_ABI: ${{ matrix.ndk_abi }}
        run: |
          set -ex
          TOOLCHAIN="$NDK/toolchains/llvm/prebuilt/linux-x86_64"

          export AR="$TOOLCHAIN/bin/llvm-ar"
          export CC="$TOOLCHAIN/bin/${TARGET}${API}-clang"
          export AS="$TOOLCHAIN/bin/${TARGET}${API}-clang"
          export CXX="$TOOLCHAIN/bin/${TARGET}${API}-clang++"
          export RANLIB="$TOOLCHAIN/bin/llvm-ranlib"
          export STRIP="$TOOLCHAIN/bin/llvm-strip"
          export ANDROID_NDK_HOME="$NDK"
          export CFLAGS="-fPIC"
          export CXXFLAGS="-fPIC"

          install_dir="$PWD/install"
          mkdir -p "$install_dir"

          cmake_args="-G Ninja -DCMAKE_INSTALL_PREFIX=$install_dir"
          cmake_args="$cmake_args -DCMAKE_SYSTEM_NAME=Android"
          cmake_args="$cmake_args -DCMAKE_ANDROID_NDK=${ANDROID_NDK_HOME}"
          cmake_args="$cmake_args -DCMAKE_ANDROID_ARCH_ABI=${ANDROID_ABI}"
          cmake_args="$cmake_args -DCMAKE_SYSTEM_VERSION=${API}"

          # Configure and build
          make configure BUILD_DIR=build CMAKE_CONFIGURE_ARGS="$cmake_args"
          make build BUILD_DIR=build CMAKE_CONFIGURE_ARGS="$cmake_args"

          # Install (skip checkbuild — it tries to run the binary which
          # is cross-compiled and can't execute on the host)
          make install-strip BUILD_DIR=build CMAKE_CONFIGURE_ARGS="$cmake_args"

          # --- Merge all static libs into a single libcurl-impersonate.a ---
          install_lib_dir="$install_dir/lib"
          deps_lib_dir="$PWD/build/deps/install/lib"

          # Copy dependency static libs
          for lib in libz.a libzstd.a libbrotlidec.a libbrotlicommon.a \
                     libbrotlienc.a libnghttp2.a libnghttp3.a libngtcp2.a \
                     libngtcp2_crypto_boringssl.a libssl.a libcrypto.a; do
              if [ -f "$deps_lib_dir/$lib" ]; then
                  cp "$deps_lib_dir/$lib" "$install_lib_dir/"
              else
                  echo "WARNING: $lib not found in $deps_lib_dir"
              fi
          done

          # Merge using the cross-compiler's -r flag (relocatable link)
          cd "$install_lib_dir"
          if [ -f libcurl-impersonate.a ]; then
              mv libcurl-impersonate.a libcurl-impersonate.orig.a
          fi

          lib_list=""
          for lib in libcurl-impersonate.orig.a libz.a libzstd.a \
                     libbrotlidec.a libbrotlicommon.a libbrotlienc.a \
                     libnghttp2.a libnghttp3.a libngtcp2.a \
                     libngtcp2_crypto_boringssl.a libssl.a libcrypto.a; do
              if [ -f "$lib" ]; then
                  lib_list="$lib_list $lib"
              fi
          done

          echo "Merging: $lib_list"
          $CC -r -o libcurl-impersonate.full.o \
              -Wl,--whole-archive $lib_list -Wl,--no-whole-archive
          $AR rcs libcurl-impersonate.a libcurl-impersonate.full.o
          rm -f libcurl-impersonate.full.o

          # Clean up intermediate libs (keep only the merged .a and headers)
          rm -f libcurl-impersonate.orig.a libz.a libzstd.a libbrotlidec.a \
                libbrotlicommon.a libbrotlienc.a libnghttp2.a libnghttp3.a \
                libngtcp2.a libngtcp2_crypto_boringssl.a libssl.a libcrypto.a

          echo "=== Final install dir ==="
          find "$install_dir" -type f | head -50

          # Create tarball with lib/ and include/
          cd "$install_dir"
          tar czf "$GITHUB_WORKSPACE/libcurl-impersonate-${{ matrix.jni_arch }}.tar.gz" \
              lib/ include/

          echo "=== Tarball contents ==="
          tar tzf "$GITHUB_WORKSPACE/libcurl-impersonate-${{ matrix.jni_arch }}.tar.gz" | head -20

      - name: Upload libcurl-impersonate (${{ matrix.jni_arch }})
        uses: actions/upload-artifact@v7
        with:
          name: libcurl-impersonate-${{ matrix.jni_arch }}
          path: libcurl-impersonate-${{ matrix.jni_arch }}.tar.gz
          retention-days: 30

  build_python:
    name: Build Python Environment
    needs: [build_curl_cffi, build_libcurl_impersonate_32bit]
    # Run even if some upstream matrix rows failed — the script handles
    # missing artifacts gracefully (skips curl_cffi for that arch).
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Checkout termux-packages
        run: git clone --depth=1 https://github.com/termux/termux-packages

      - name: Download curl_cffi wheels (64-bit ABIs)
        uses: actions/download-artifact@v8
        with:
          pattern: curl_cffi-android-wheels-*
          merge-multiple: true
          path: curl_cffi_wheels_downloaded

      - name: Download libcurl-impersonate (32-bit ABIs)
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          pattern: libcurl-impersonate-*
          merge-multiple: true
          path: libcurl_impersonate_downloaded

      - name: Prepare Wheels and Libraries Directory
        run: |
          # Diagnostic: show what was actually downloaded
          echo "=== Contents of curl_cffi_wheels_downloaded/ ==="
          find curl_cffi_wheels_downloaded -type f 2>/dev/null || echo "(empty or missing)"
          echo ""
          echo "=== Contents of libcurl_impersonate_downloaded/ ==="
          find libcurl_impersonate_downloaded -type f 2>/dev/null || echo "(empty or missing)"
          echo ""

          # download-artifact@v8 may leave .zip files if the artifact
          # itself is a zip. Extract any .zip files found in the download
          # directories so the .whl / .tar.gz files inside are accessible.
          for dir in curl_cffi_wheels_downloaded libcurl_impersonate_downloaded; do
            if [ -d "$dir" ]; then
              find "$dir" -name '*.zip' -exec sh -c '
                echo "Extracting: $1"
                unzip -o "$1" -d "$(dirname "$1")"
                rm -f "$1"
              ' _ {} \;
            fi
          done

          echo "=== After zip extraction ==="
          echo "curl_cffi_wheels_downloaded:"
          find curl_cffi_wheels_downloaded -type f 2>/dev/null || echo "(empty or missing)"
          echo ""
          echo "libcurl_impersonate_downloaded:"
          find libcurl_impersonate_downloaded -type f 2>/dev/null || echo "(empty or missing)"
          echo ""

          # --- Route 64-bit wheels to their arch folders ---
          declare -A abi_map=(
            [arm64-v8a]=arm64_v8a
            [x86_64]=x86_64
          )

          for jni_arch in "${!abi_map[@]}"; do
            mkdir -p "termux-packages/curl_cffi_wheels/$jni_arch"
          done
          # Create dirs for 32-bit too (will be empty — handled by cross-compile)
          mkdir -p "termux-packages/curl_cffi_wheels/armeabi-v7a"
          mkdir -p "termux-packages/curl_cffi_wheels/x86"

          # Use find with -name to catch .whl files at any depth —
          # download-artifact may extract them into subdirectories
          # depending on the artifact's internal structure.
          while IFS= read -r -d '' whl; do
            name=$(basename "$whl")
            for jni_arch in arm64-v8a x86_64; do
              cibw_tag="android_${abi_map[$jni_arch]}"
              if [[ "$name" == *"$cibw_tag"* ]]; then
                cp "$whl" "termux-packages/curl_cffi_wheels/$jni_arch/"
                echo "Routed $name -> $jni_arch"
                break
              fi
            done
          done < <(find curl_cffi_wheels_downloaded -name '*.whl' -print0 2>/dev/null)

          # --- Route 32-bit libcurl-impersonate tarballs to their arch folders ---
          mkdir -p "termux-packages/libcurl_impersonate/armeabi-v7a"
          mkdir -p "termux-packages/libcurl_impersonate/x86"

          while IFS= read -r -d '' tarball; do
            name=$(basename "$tarball")
            if echo "$name" | grep -q "armeabi-v7a"; then
              cp "$tarball" "termux-packages/libcurl_impersonate/armeabi-v7a/"
              echo "Routed $name -> armeabi-v7a"
            elif echo "$name" | grep -q "x86"; then
              # Match x86 but NOT x86_64 (already filtered by download, but be safe)
              if ! echo "$name" | grep -q "x86_64"; then
                cp "$tarball" "termux-packages/libcurl_impersonate/x86/"
                echo "Routed $name -> x86"
              fi
            fi
          done < <(find libcurl_impersonate_downloaded -name '*.tar.gz' -print0 2>/dev/null)

          echo "=== Wheels prepared ==="
          find termux-packages/curl_cffi_wheels -type f | sort
          echo ""
          echo "=== Wheels per arch ==="
          for d in termux-packages/curl_cffi_wheels/*/; do
            count=$(find "$d" -name '*.whl' | wc -l)
            echo "  $d: $count wheel(s)"
          done
          echo ""
          echo "=== libcurl-impersonate prepared ==="
          find termux-packages/libcurl_impersonate -type f | sort
          echo ""
          echo "=== libcurl-impersonate per arch ==="
          for d in termux-packages/libcurl_impersonate/*/; do
            count=$(find "$d" -name '*.tar.gz' | wc -l)
            echo "  $d: $count tarball(s)"
          done

      - name: Prepare build scripts
        run: |
          cp scripts/build_python.sh termux-packages/build_python.sh
          chmod +x termux-packages/build_python.sh

      - name: Set up version
        id: version
        run: |
          cd termux-packages/packages/python
          VERSION=$(grep "^TERMUX_PKG_VERSION=" build.sh | cut -d'=' -f2 | tr -d '"' | tr -d "'")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Python version: $VERSION"

      - name: Build Python for all ABIs
        working-directory: termux-packages
        run: |
          echo "Building Python for aarch64, arm, i686 and x86_64"
          ./scripts/run-docker.sh ./clean.sh
          ./scripts/run-docker.sh ./build_python.sh

      - name: Verify build outputs
        run: |
          echo "=== JNI Libraries Structure ==="
          find termux-packages/output/jniLibs -type f
          for arch in arm64-v8a armeabi-v7a x86 x86_64; do
            if [ -d "termux-packages/output/jniLibs/$arch" ]; then
              echo "--- $arch ---"
              ls -lh "termux-packages/output/jniLibs/$arch/"
            fi
          done

      - name: Create release packages
        id: package
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          RELEASE_DIR="${{ github.workspace }}/release"
          mkdir -p "$RELEASE_DIR"

          cd termux-packages/output/jniLibs

          for arch in arm64-v8a armeabi-v7a x86 x86_64; do
            if [ -d "$arch" ]; then
              echo "Packaging $arch..."

              if [ ! -f "$arch/libpython.so" ]; then
                echo "ERROR: libpython.so not found in $arch"
                exit 1
              fi
              if [ ! -f "$arch/libpython.zip.so" ]; then
                echo "ERROR: libpython.zip.so not found in $arch"
                exit 1
              fi

              ZIP_NAME="python-${VERSION}-${arch}.zip"
              cd "$arch"
              zip -9 "$RELEASE_DIR/$ZIP_NAME" *
              cd ..

              echo "Created: $ZIP_NAME"
              ls -lh "$RELEASE_DIR/$ZIP_NAME"
            else
              echo "WARNING: Architecture $arch not found"
            fi
          done

          echo ""
          echo "=== Release Packages ==="
          ls -lh "$RELEASE_DIR/"

      - name: Generate checksums
        working-directory: ${{ github.workspace }}/release
        run: |
          sha256sum *.zip > SHA256SUMS.txt
          echo ""
          echo "=== SHA256 Checksums ==="
          cat SHA256SUMS.txt

      - name: Upload arm64-v8a
        uses: actions/upload-artifact@v7
        with:
          name: python-${{ steps.version.outputs.VERSION }}-arm64-v8a
          path: ${{ github.workspace }}/release/python-${{ steps.version.outputs.VERSION }}-arm64-v8a.zip
          retention-days: 90
          compression-level: 0

      - name: Upload armeabi-v7a
        uses: actions/upload-artifact@v7
        with:
          name: python-${{ steps.version.outputs.VERSION }}-armeabi-v7a
          path: ${{ github.workspace }}/release/python-${{ steps.version.outputs.VERSION }}-armeabi-v7a.zip
          retention-days: 90
          compression-level: 0

      - name: Upload x86
        uses: actions/upload-artifact@v7
        with:
          name: python-${{ steps.version.outputs.VERSION }}-x86
          path: ${{ github.workspace }}/release/python-${{ steps.version.outputs.VERSION }}-x86.zip
          retention-days: 90
          compression-level: 0

      - name: Upload x86_64
        uses: actions/upload-artifact@v7
        with:
          name: python-${{ steps.version.outputs.VERSION }}-x86_64
          path: ${{ github.workspace }}/release/python-${{ steps.version.outputs.VERSION }}-x86_64.zip
          retention-days: 90
          compression-level: 0

      - name: Upload checksums
        uses: actions/upload-artifact@v7
        with:
          name: python-${{ steps.version.outputs.VERSION }}-SHA256SUMS
          path: ${{ github.workspace }}/release/SHA256SUMS.txt
          retention-days: 90

      - name: Build Summary
        run: |
          echo "## Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** Manual trigger (workflow_dispatch)" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ABI Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| ABI | curl_cffi | cffi | pycryptodome | Method |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-----------|------|--------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| arm64-v8a | yes | yes | yes | cibuildwheel |" >> $GITHUB_STEP_SUMMARY
          echo "| x86_64 | yes | yes | yes | cibuildwheel |" >> $GITHUB_STEP_SUMMARY
          echo "| armeabi-v7a | yes | yes | yes | libcurl-impersonate from source + NDK cross-compile |" >> $GITHUB_STEP_SUMMARY
          echo "| x86 | yes | yes | yes | libcurl-impersonate from source + NDK cross-compile |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts Created:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cd ${{ github.workspace }}/release
          for file in *.zip; do
            size=$(ls -lh "$file" | awk '{print $5}')
            echo "- \`$file\` ($size)" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Each architecture is available as a separate artifact." >> $GITHUB_STEP_SUMMARY
          echo "Download individual artifacts from the Actions tab." >> $GITHUB_STEP_SUMMARY
