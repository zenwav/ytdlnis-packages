name: Build Python with curl_cffi for Android

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Python plugin for YTDLnis'
        required: true
        type: string

jobs:
  build_curl_cffi:
    name: Build curl_cffi wheels (${{ matrix.jni_arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # termux_arch : arch name used by Termux's build-package.sh
          # jni_arch    : Android JNI lib folder name
          # cibw_arch   : cibuildwheel Android arch identifier
          # termux_binary: Termux apt repo binary-<arch> subdir used to
          #                fetch the prebuilt libffi deb for cffi
          - termux_arch: aarch64
            jni_arch: arm64-v8a
            cibw_arch: arm64_v8a
            termux_binary: binary-aarch64
          - termux_arch: arm
            jni_arch: armeabi-v7a
            cibw_arch: armeabi_v7a
            termux_binary: binary-arm
          - termux_arch: i686
            jni_arch: x86
            cibw_arch: x86
            termux_binary: binary-i686
          - termux_arch: x86_64
            jni_arch: x86_64
            cibw_arch: x86_64
            termux_binary: binary-x86_64
    steps:
      - name: Checkout curl_cffi repository
        uses: actions/checkout@v7
        with:
          repository: lexiforest/curl_cffi
          path: curl_cffi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool make zip

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: all

      - name: Build curl_cffi Wheel
        uses: pypa/cibuildwheel@v3.3.1
        with:
          package-dir: curl_cffi
        env:
          CIBW_PLATFORM: android
          CIBW_BUILD: cp313-android_${{ matrix.cibw_arch }}
          CIBW_BEFORE_ALL: "make -C curl_cffi preprocess"
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_API_LEVEL: 24

      - name: Build cffi Wheel
        run: |
          pip install cibuildwheel==3.3.1
          # Download and extract libffi deb package from the Termux
          # repository for THIS matrix arch. The repo layout is:
          #   .../dists/stable/main/binary-<arch>/Packages
          # and the per-arch deb lives under the same tree.
          curl -L -o packages.txt "https://packages-cf.termux.org/apt/termux-main/dists/stable/main/${{ matrix.termux_binary }}/Packages"
          libffi_path=$(grep -A 10 "Package: libffi$" packages.txt | grep "Filename: " | cut -d' ' -f2)
          curl -L -o libffi.deb "https://packages-cf.termux.org/apt/termux-main/$libffi_path"

          # Download and unpack cffi source
          pip download --no-binary :all: --no-deps cffi
          tar -xf cffi-*.tar.gz
          cffi_dir=$(ls -d cffi-*/)

          # Extract libffi inside the cffi project folder
          mkdir -p "$cffi_dir/libffi_extracted"
          dpkg-deb -x libffi.deb "$cffi_dir/libffi_extracted"

          # Resolve the ABSOLUTE host path to the extracted libffi.
          # NOTE: cibuildwheel's Android platform builds directly on the host
          # runner (NOT inside a Docker container), so the package lives at
          # $GITHUB_WORKSPACE/<cffi_dir>, not at /project. Hardcoding /project
          # here makes the compiler look for ffi.h in a path that does not exist,
          # which is exactly the "fatal error: 'ffi.h' file not found" we saw.
          LIBFFI_PREFIX="${PWD%/}/${cffi_dir%/}/libffi_extracted/data/data/com.termux/files/usr"
          export LIBFFI_PREFIX

          # Patch cffi's setup.py to use the extracted libffi paths directly
          python -c "
          import os
          setup_path = os.path.join('$cffi_dir', 'setup.py')
          prefix = os.environ['LIBFFI_PREFIX']
          content = open(setup_path).read()
          old_inc = \"include_dirs = ['/usr/include/ffi',\\n                '/usr/include/libffi']\"
          new_inc = \"include_dirs = [\" + repr(prefix + '/include') + \"]\"
          assert old_inc in content, 'include_dirs pattern not found in setup.py'
          content = content.replace(old_inc, new_inc)
          old_lib = 'library_dirs = []'
          new_lib = \"library_dirs = [\" + repr(prefix + '/lib') + \"]\"
          assert old_lib in content, 'library_dirs pattern not found in setup.py'
          content = content.replace(old_lib, new_lib)
          content = content.replace('def use_pkg_config():', 'def use_pkg_config():\n    return')
          open(setup_path, 'w').write(content)
          print('setup.py patched successfully! libffi prefix:', prefix)
          "

          # Build cffi using cibuildwheel
          cibuildwheel "$cffi_dir" --output-dir wheelhouse
        env:
          CIBW_PLATFORM: android
          CIBW_BUILD: cp313-android_${{ matrix.cibw_arch }}
          CIBW_ARCHS: ${{ matrix.cibw_arch }}
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_API_LEVEL: 24

      - name: Build pycryptodome Wheel
        run: |
          pip download --no-binary :all: --no-deps pycryptodome
          tar -xf pycryptodome-*.tar.gz
          crypto_dir=$(ls -d pycryptodome-*/)
          cibuildwheel "$crypto_dir" --output-dir wheelhouse
        env:
          CIBW_PLATFORM: android
          CIBW_BUILD: cp313-android_${{ matrix.cibw_arch }}
          CIBW_ARCHS: ${{ matrix.cibw_arch }}
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_API_LEVEL: 24

      - name: Upload Wheels (${{ matrix.jni_arch }})
        uses: actions/upload-artifact@v7
        with:
          name: curl_cffi-android-wheels-${{ matrix.jni_arch }}
          path: wheelhouse/*.whl

  build_python:
    name: Build Python Environment
    needs: build_curl_cffi
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Checkout termux-packages
        run: git clone --depth=1 https://github.com/termux/termux-packages

      - name: Download curl_cffi wheels (all ABIs)
        uses: actions/download-artifact@v8
        with:
          # Match every per-arch wheel artifact produced by the
          # build_curl_cffi matrix and merge them into a single folder.
          pattern: curl_cffi-android-wheels-*
          merge-multiple: true
          path: curl_cffi_wheels_downloaded

      - name: Prepare Wheels Directory
        run: |
          # cibuildwheel names Android wheels with a platform tag of the
          # form "android_<cibw_arch>", e.g.:
          #   curl_cffi-0.7.4-cp313-cp313-android_arm64_v8a.whl
          #   cffi-1.17.1-cp313-cp313-android_armeabi_v7a.whl
          #   pycryptodome-3.21.0-cp313-cp313-android_x86.whl
          #   cffi-1.17.1-cp313-cp313-android_x86_64.whl
          #
          # We sort each wheel into the matching jniLibs arch folder so
          # build_python.sh can inject it during packaging.
          declare -A abi_map=(
            [arm64-v8a]=arm64_v8a
            [armeabi-v7a]=armeabi_v7a
            [x86_64]=x86_64
            [x86]=x86
          )

          # Create a wheel folder per JNI arch.
          for jni_arch in "${!abi_map[@]}"; do
            mkdir -p "termux-packages/curl_cffi_wheels/$jni_arch"
          done

          # Walk every downloaded wheel and route it to the right arch.
          # IMPORTANT: check x86_64 BEFORE x86, because "android_x86" is
          # a substring of "android_x86_64" and would otherwise mis-route
          # the 64-bit wheel into the 32-bit folder.
          for whl in curl_cffi_wheels_downloaded/*.whl; do
            [[ -f "$whl" ]] || continue
            name=$(basename "$whl")
            matched=0
            for jni_arch in arm64-v8a armeabi-v7a x86_64 x86; do
              cibw_tag="android_${abi_map[$jni_arch]}"
              if [[ "$name" == *"$cibw_tag"* ]]; then
                cp "$whl" "termux-packages/curl_cffi_wheels/$jni_arch/"
                echo "Routed $name -> $jni_arch"
                matched=1
                break
              fi
            done
            if [[ "$matched" -eq 0 ]]; then
              echo "Warning: Could not classify wheel $name"
            fi
          done

          # Download pure-python wheels (ABI-independent) into every arch
          # folder so build_python.sh finds them regardless of which arch
          # it is currently packaging.
          for jni_arch in arm64-v8a armeabi-v7a x86 x86_64; do
            pip download --only-binary=:all: --no-deps \
              --dest "termux-packages/curl_cffi_wheels/$jni_arch" \
              mutagen certifi
          done

          echo "=== Wheels prepared ==="
          find termux-packages/curl_cffi_wheels -type f | sort

      - name: Prepare build scripts
        run: |
          cp scripts/build_python.sh termux-packages/build_python.sh
          chmod +x termux-packages/build_python.sh

      - name: Set up version
        id: version
        run: |
          cd termux-packages/packages/python
          VERSION=$(grep "^TERMUX_PKG_VERSION=" build.sh | cut -d'=' -f2 | tr -d '"' | tr -d "'")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Python version: $VERSION"

      - name: Build Python for all ABIs
        working-directory: termux-packages
        run: |
          echo "Building Python for aarch64, arm, i686 and x86_64"
          ./scripts/run-docker.sh ./clean.sh
          ./scripts/run-docker.sh ./build_python.sh

      - name: Verify build outputs
        run: |
          echo "=== JNI Libraries Structure ==="
          find termux-packages/output/jniLibs -type f
          for arch in arm64-v8a armeabi-v7a x86 x86_64; do
            if [ -d "termux-packages/output/jniLibs/$arch" ]; then
              echo "--- $arch ---"
              ls -lh "termux-packages/output/jniLibs/$arch/"
            fi
          done

      - name: Create release packages
        id: package
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          RELEASE_DIR="${{ github.workspace }}/release"
          mkdir -p "$RELEASE_DIR"

          cd termux-packages/output/jniLibs

          # Package each architecture
          for arch in arm64-v8a armeabi-v7a x86 x86_64; do
            if [ -d "$arch" ]; then
              echo "Packaging $arch..."

              # Verify required files exist
              if [ ! -f "$arch/libpython.so" ]; then
                echo "ERROR: libpython.so not found in $arch"
                exit 1
              fi
              if [ ! -f "$arch/libpython.zip.so" ]; then
                echo "ERROR: libpython.zip.so not found in $arch"
                exit 1
              fi

              # Create zip: python-VERSION-ARCH.zip
              ZIP_NAME="python-${VERSION}-${arch}.zip"
              cd "$arch"
              zip -9 "$RELEASE_DIR/$ZIP_NAME" *
              cd ..

              echo "Created: $ZIP_NAME"
              ls -lh "$RELEASE_DIR/$ZIP_NAME"
            else
              echo "WARNING: Architecture $arch not found"
            fi
          done

          # List all created packages
          echo ""
          echo "=== Release Packages ==="
          ls -lh "$RELEASE_DIR/"

      - name: Generate checksums
        working-directory: ${{ github.workspace }}/release
        run: |
          sha256sum *.zip > SHA256SUMS.txt
          echo ""
          echo "=== SHA256 Checksums ==="
          cat SHA256SUMS.txt

      - name: Upload arm64-v8a
        uses: actions/upload-artifact@v7
        with:
          name: python-${{ steps.version.outputs.VERSION }}-arm64-v8a
          path: ${{ github.workspace }}/release/python-${{ steps.version.outputs.VERSION }}-arm64-v8a.zip
          retention-days: 90
          compression-level: 0

      - name: Upload armeabi-v7a
        uses: actions/upload-artifact@v7
        with:
          name: python-${{ steps.version.outputs.VERSION }}-armeabi-v7a
          path: ${{ github.workspace }}/release/python-${{ steps.version.outputs.VERSION }}-armeabi-v7a.zip
          retention-days: 90
          compression-level: 0

      - name: Upload x86
        uses: actions/upload-artifact@v7
        with:
          name: python-${{ steps.version.outputs.VERSION }}-x86
          path: ${{ github.workspace }}/release/python-${{ steps.version.outputs.VERSION }}-x86.zip
          retention-days: 90
          compression-level: 0

      - name: Upload x86_64
        uses: actions/upload-artifact@v7
        with:
          name: python-${{ steps.version.outputs.VERSION }}-x86_64
          path: ${{ github.workspace }}/release/python-${{ steps.version.outputs.VERSION }}-x86_64.zip
          retention-days: 90
          compression-level: 0

      - name: Upload checksums
        uses: actions/upload-artifact@v7
        with:
          name: python-${{ steps.version.outputs.VERSION }}-SHA256SUMS
          path: ${{ github.workspace }}/release/SHA256SUMS.txt
          retention-days: 90

      - name: Build Summary
        run: |
          echo "## Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** Manual trigger (workflow_dispatch)" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**ABIs:** arm64-v8a, armeabi-v7a, x86, x86_64" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts Created:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cd ${{ github.workspace }}/release
          for file in *.zip; do
            size=$(ls -lh "$file" | awk '{print $5}')
            echo "- \`$file\` ($size)" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Each architecture is available as a separate artifact." >> $GITHUB_STEP_SUMMARY
          echo "Download individual artifacts from the Actions tab." >> $GITHUB_STEP_SUMMARY
